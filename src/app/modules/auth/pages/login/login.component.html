<div class="min-h-screen flex items-center justify-center bg-slate-900 p-6">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden">
        <div class="p-8">
            <div class="text-center mb-10">
                <h1 class="text-4xl font-black text-slate-800 tracking-tighter">
                    FOOD<span class="text-blue-600">FLOW</span>
                </h1>
                <p class="text-slate-500 mt-2 font-medium">Gestión de Restaurantes v1.0</p>
            </div>

            <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Correo Electrónico</label>
                    <input type="email" formControlName="email"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all flex-1"
                        placeholder="nelson@foodflow.com">
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Contraseña</label>
                    <input type="password" formControlName="password"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all flex-1"
                        placeholder="••••••••">
                </div>

                <button type="submit" [disabled]="loginForm.invalid"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-200 transition-all transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                    Iniciar Sesión
                </button>
            </form>
        </div>

        <div class="bg-slate-50 p-4 text-center">
            <p class="text-xs text-slate-400 font-semibold uppercase tracking-widest">
                Santa Ana, El Salvador
            </p>
        </div>
    </div>
</div>
